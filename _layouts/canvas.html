<!DOCTYPE html>
<html lang="en">
<head>
  <title>{{ site.name }} – {{ site.description }}</title>

  {% include meta.html %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" type="image/jpg" href="{{ site.baseurl }}/images/vuongnm-colorful.jpg">
  <meta name="theme-color" content="#6C3FF5">

<style>
  :root{
    --accent:#6C3FF5; --accent2:#FF4D8D; --accent3:#17D4C2; --accent4:#FF7A3D;
    --bg:#F0ECFF; --card:#fff; --ink:#141414;
    --display:"Space Grotesk","Helvetica Neue",sans-serif;
    --mono:"Space Mono",ui-monospace,Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none}
  body{
    background:var(--bg);
    background-image:radial-gradient(rgba(0,0,0,.10) 1.4px,transparent 1.4px);
    background-size:22px 22px;
    font-family:var(--display); color:var(--ink);
    -webkit-user-select:none; user-select:none;
  }
  #stage{position:fixed; inset:0; cursor:grab; touch-action:none; overflow:hidden}
  #stage.grabbing{cursor:grabbing}
  #cam{position:absolute; top:0; left:0; width:100%; height:100%; transform-origin:50% 50%; will-change:transform}
  #plane{position:absolute; top:0; left:0; will-change:transform}

  .card{
    position:absolute; top:0; left:0;
    border:3px solid #000; border-radius:14px; background:var(--card);
    box-shadow:6px 6px 0 0 #000; overflow:hidden;
    text-decoration:none; color:inherit;
    transition:transform .16s cubic-bezier(.34,1.56,.64,1), box-shadow .16s ease;
    display:flex; flex-direction:column;
  }
  .card:hover{ z-index:5; box-shadow:9px 10px 0 0 #000; }
  .card .thumb{
    width:100%; background:var(--accent3); overflow:hidden;
    border-bottom:3px solid #000; display:block; flex:1 1 auto; min-height:70px;
  }
  .card .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card .cap{
    font-family:var(--display); font-weight:700; font-size:14px; line-height:1.2;
    padding:10px 12px; color:#fff; background:var(--accent);
    flex:0 0 auto; display:flex; align-items:center; max-height:45%; overflow:hidden;
  }

  .topbar{ position:fixed; top:16px; left:16px; right:16px; z-index:50; display:flex; align-items:center; gap:14px; pointer-events:none; }
  .brand{
    pointer-events:auto; display:flex; align-items:center; gap:12px;
    background:var(--card); border:3px solid #000; border-radius:14px;
    box-shadow:5px 5px 0 0 #000; padding:8px 14px 8px 8px; transform:rotate(-1deg);
    text-decoration:none; color:inherit; max-width:60vw;
  }
  .brand img{ width:46px; height:46px; border:2px solid #000; border-radius:9px; object-fit:cover; box-shadow:3px 3px 0 0 var(--accent2); flex:0 0 auto; }
  .brand .n{ font-weight:700; font-size:16px; letter-spacing:-.01em; line-height:1.05; white-space:nowrap }
  .brand .d{ font-family:var(--mono); font-size:11px; color:#555; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .topnav{ pointer-events:auto; margin-left:auto; display:flex; gap:10px }
  .topnav a{
    font-family:var(--display); font-weight:700; font-size:14px; text-decoration:none;
    color:#fff; background:var(--accent); border:2px solid #000; border-radius:9px;
    padding:8px 13px; box-shadow:3px 3px 0 0 #000;
    transition:transform .12s cubic-bezier(.34,1.56,.64,1), box-shadow .12s ease;
  }
  .topnav a:nth-child(1){transform:rotate(-2deg)}
  .topnav a:nth-child(2){background:var(--accent2);transform:rotate(1.5deg)}
  .topnav a:nth-child(3){background:var(--accent3);color:#000;transform:rotate(-1deg)}
  .topnav a:hover{ transform:rotate(0) translate(-2px,-2px); box-shadow:5px 6px 0 0 #000 }

  .controls{ position:fixed; right:16px; bottom:16px; z-index:50; display:flex; flex-direction:column; gap:10px }
  .controls button{
    width:48px; height:48px; font-size:22px; font-weight:700; font-family:var(--display);
    background:var(--card); color:#000; border:3px solid #000; border-radius:12px;
    box-shadow:4px 4px 0 0 #000; cursor:pointer; line-height:1;
    transition:transform .1s ease, box-shadow .1s ease;
  }
  .controls button:hover{ background:var(--accent4) }
  .controls button:active{ transform:translate(3px,3px); box-shadow:0 0 0 0 #000 }

  .hint{
    position:fixed; left:50%; bottom:18px; transform:translateX(-50%) rotate(-1deg); z-index:50;
    font-family:var(--mono); font-size:12px; font-weight:700;
    background:#000; color:#fff; padding:7px 14px; border-radius:20px;
    box-shadow:3px 3px 0 0 var(--accent2); pointer-events:none; transition:opacity .5s ease;
    max-width:92vw; text-align:center;
  }

  @media (max-width:640px){
    .brand{ padding:6px 10px 6px 6px; max-width:none; }
    .brand img{ width:38px; height:38px }
    .brand .d{ display:none }
    .brand .n{ font-size:14px }
    .topnav{ gap:7px }
    .topnav a{ font-size:12px; padding:7px 10px }
    .hint{ font-size:11px }
  }
</style>
</head>
<body>
{{ content }}
{% include analytics.html %}
</body>
</html>
