<!DOCTYPE html>
<html lang="en">
<head>
  <title>{{ site.name }} – {{ site.description }}</title>

  {% include meta.html %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" type="image/jpg" href="{{ site.baseurl }}/images/vuongnm-colorful.jpg">
  <meta name="theme-color" content="#6C3FF5">

<style>
  :root{
    --accent:#6C3FF5; --accent2:#FF4D8D; --accent3:#17D4C2; --accent4:#FF7A3D;
    --bg:#F0ECFF; --card:#fff; --ink:#141414;
    --display:"Space Grotesk","Helvetica Neue",sans-serif;
    --mono:"Space Mono",ui-monospace,Menlo,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none}
  body{
    background:var(--bg);
    background-image:radial-gradient(rgba(0,0,0,.10) 1.4px,transparent 1.4px);
    background-size:22px 22px;
    font-family:var(--display); color:var(--ink);
    -webkit-user-select:none; user-select:none;
  }
  #stage{position:fixed; inset:0; cursor:grab; touch-action:none; overflow:hidden}
  #stage.grabbing{cursor:grabbing}
  #cam{position:absolute; top:0; left:0; width:100%; height:100%; transform-origin:50% 50%; will-change:transform}
  #plane{position:absolute; top:0; left:0; will-change:transform}

  .card{
    position:absolute; top:0; left:0;
    border:3px solid #000; border-radius:14px; background:var(--card);
    box-shadow:6px 6px 0 0 #000; overflow:hidden;
    text-decoration:none; color:inherit;
    transition:transform .16s cubic-bezier(.34,1.56,.64,1), box-shadow .16s ease;
    display:flex; flex-direction:column;
  }
  .card:hover{ z-index:5; box-shadow:9px 10px 0 0 #000; }
  .card .thumb{
    width:100%; background:var(--accent3); overflow:hidden;
    border-bottom:3px solid #000; display:block; flex:1 1 auto; min-height:70px;
  }
  .card .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .card .cap{
    font-family:var(--display); font-weight:700; font-size:14px; line-height:1.2;
    padding:10px 12px; color:#fff; background:var(--accent);
    flex:0 0 auto; display:flex; align-items:center; max-height:45%; overflow:hidden;
  }
  /* post intro, revealed at the bottom of the card on hover */
  .card .excerpt{
    position:absolute; left:0; right:0; bottom:0; z-index:2;
    background:#141414; color:#fff;
    font-family:var(--display); font-weight:500; font-size:12.5px; line-height:1.35;
    padding:11px 13px; border-top:3px solid #000;
    max-height:78%; overflow:hidden;
    transform:translateY(101%); transition:transform .2s cubic-bezier(.34,1.4,.64,1);
    pointer-events:none;
  }
  .card:hover .excerpt{ transform:translateY(0); }

  /* thin black top bar with links */
  .topbar{
    position:fixed; top:0; left:0; right:0; z-index:50; height:46px;
    background:#000; display:flex; align-items:center; gap:16px; padding:0 16px;
  }
  .brand{ display:flex; align-items:center; gap:9px; text-decoration:none; color:#fff; }
  .brand img{ width:28px; height:28px; border:2px solid #fff; border-radius:6px; object-fit:cover; }
  .brand .n{ font-family:var(--display); font-weight:700; font-size:15px; letter-spacing:-.01em; white-space:nowrap; }
  .topbar nav{ margin-left:auto; display:flex; gap:22px; }
  .topbar nav a{
    font-family:var(--display); font-weight:600; font-size:14px; text-decoration:none;
    color:#fff; border-bottom:2px solid transparent; padding-bottom:2px;
    transition:color .12s ease, border-color .12s ease;
  }
  .topbar nav a:hover{ color:var(--accent3); border-bottom-color:var(--accent3); }

  .controls{ position:fixed; right:16px; bottom:16px; z-index:50; display:flex; flex-direction:column; gap:10px }
  .controls button{
    width:48px; height:48px; font-size:22px; font-weight:700; font-family:var(--display);
    background:var(--card); color:#000; border:3px solid #000; border-radius:12px;
    box-shadow:4px 4px 0 0 #000; cursor:pointer; line-height:1;
    transition:transform .1s ease, box-shadow .1s ease;
  }
  .controls button:hover{ background:var(--accent4) }
  .controls button:active{ transform:translate(3px,3px); box-shadow:0 0 0 0 #000 }
  .controls button svg{ display:block; width:26px; height:26px; margin:auto; color:#000; }
  @keyframes windSway{ 0%{transform:translateX(0)} 20%{transform:translateX(4px)} 50%{transform:translateX(-2px)} 75%{transform:translateX(2px)} 100%{transform:translateX(0)} }
  #breeze.gust svg{ animation:windSway .65s ease-out; }

  .hint{
    position:fixed; left:50%; bottom:18px; transform:translateX(-50%) rotate(-1deg); z-index:50;
    font-family:var(--mono); font-size:12px; font-weight:700;
    background:#000; color:#fff; padding:7px 14px; border-radius:20px;
    box-shadow:3px 3px 0 0 var(--accent2); pointer-events:none; transition:opacity .5s ease;
    max-width:92vw; text-align:center;
  }

  /* detail overlay — flip + enlarge the tapped card, show details, close button */
  #detail{ position:fixed; inset:0; z-index:100; display:none; align-items:center; justify-content:center; padding:20px; }
  #detail.open{ display:flex; }
  #detail .backdrop{ position:absolute; inset:0; background:rgba(18,16,28,.55); opacity:0; transition:opacity .3s ease; }
  #detail.show .backdrop{ opacity:1; }
  .detailcard{ position:relative; width:min(92vw,560px); height:min(86vh,640px); }
  .detailcard .flip{
    position:relative; width:100%; height:100%; transform-style:preserve-3d;
    transition:transform .55s cubic-bezier(.3,.85,.3,1), opacity .35s ease;
    transform:perspective(1600px) rotateY(0deg) scale(.7); opacity:0;
  }
  #detail.show .flip{ transform:perspective(1600px) rotateY(180deg) scale(1); opacity:1; }
  .detailcard .face{
    position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
    border:3px solid #000; border-radius:18px; overflow:hidden; box-shadow:8px 10px 0 0 #000;
    background:var(--card); display:flex; flex-direction:column;
  }
  .face.front .thumb{ flex:1 1 auto; min-height:0; background:var(--accent3); overflow:hidden; border-bottom:3px solid #000; }
  .face.front .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .face.front .cap{ flex:0 0 auto; background:var(--accent); color:#fff; font-family:var(--display); font-weight:700; font-size:20px; line-height:1.2; padding:14px 16px; }
  .face.back{ transform:rotateY(180deg); }
  .face.back .bar{ flex:0 0 auto; background:#000; color:#fff; font-family:var(--display); font-weight:700; font-size:18px; line-height:1.25; padding:15px 52px 15px 18px; }
  .face.back .content{ flex:1 1 auto; overflow:auto; padding:16px 18px 22px; font-family:var(--display); font-size:15px; line-height:1.55; color:var(--ink); }
  .face.back .content .lead{ font-weight:600; font-size:16px; color:#000; margin:0 0 12px; }
  .face.back .content .dloading{ color:#999; font-family:var(--mono); font-size:13px; }
  .face.back .content p{ margin:0 0 11px; }
  .face.back .content img{ max-width:100%; height:auto; border:2px solid #000; border-radius:8px; margin:8px 0; }
  .face.back .content h1,.face.back .content h2,.face.back .content h3{ font-family:var(--display); font-size:18px; margin:16px 0 6px; }
  .face.back .content pre{ background:#f2eeff; border:2px solid #000; border-radius:8px; padding:10px 12px; overflow:auto; font-family:var(--mono); font-size:12.5px; }
  .face.back .content code{ font-family:var(--mono); font-size:13px; }
  .face.back .content a{ color:var(--accent); font-weight:600; }
  .detailcard .close{
    position:absolute; top:10px; right:10px; z-index:5; width:38px; height:38px;
    border:3px solid #000; background:#fff; color:#000; border-radius:10px;
    font-size:22px; font-weight:700; line-height:1; cursor:pointer; box-shadow:3px 3px 0 0 #000;
    opacity:0; transition:opacity .3s ease .12s, transform .1s ease, background .12s ease;
  }
  #detail.show .close{ opacity:1; }
  .detailcard .close:hover{ background:var(--accent2); color:#fff; }
  .detailcard .close:active{ transform:translate(3px,3px); box-shadow:0 0 0 0 #000; }

  @media (max-width:640px){
    .topbar{ gap:10px; padding:0 12px; }
    .brand .n{ font-size:14px }
    .topbar nav{ gap:15px }
    .topbar nav a{ font-size:13px }
    .hint{ font-size:11px }
  }
</style>
</head>
<body>
{{ content }}
{% include analytics.html %}
</body>
</html>
